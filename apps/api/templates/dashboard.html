<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roxas City HIS | Pure Python Cartography</title>
    <!-- Tailwind via CDN for quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #0f172a; color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif; }
        .map-container { height: 100vh; width: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex overflow-hidden">

    <!-- Sidebar Dashboard -->
    <aside class="w-80 h-full glass-panel flex flex-col relative z-10 shadow-2xl shrink-0">
        <div class="p-6 border-b border-white/10">
            <h1 class="text-lg font-bold text-sky-400 tracking-wide uppercase">Roxas City HIS</h1>
            <p class="text-xs text-slate-400 mt-1 font-mono">Python Folium + JAX Engine</p>
        </div>

        <div class="p-6 space-y-6 flex-1 overflow-y-auto">
            <div>
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Simulation Parameters</h2>
                
                <form id="sim-form" class="space-y-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Storm Intensity (mm/hr)</label>
                        <input type="number" id="rain" value="65.4" step="0.1" class="w-full bg-slate-900/50 border border-slate-700 rounded px-3 py-2 text-sm text-white outline-none focus:border-sky-500">
                    </div>
                    
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Coastal Tide Boundary (m)</label>
                        <input type="number" id="tide" value="0.5" step="0.1" class="w-full bg-slate-900/50 border border-slate-700 rounded px-3 py-2 text-sm text-white outline-none focus:border-sky-500">
                    </div>

                    <button type="submit" id="run-btn" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 px-4 rounded transition shadow-lg shadow-sky-500/20">
                        Solve JAX Tensors
                    </button>
                </form>
            </div>

            <div id="results" class="hidden border-t border-white/10 pt-6">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-3">Engine Outputs</h2>
                <div class="bg-slate-900/50 rounded p-3 space-y-2 text-xs font-mono">
                    <div class="flex justify-between"><span class="text-slate-400">Peak Discharge:</span> <span id="out-q" class="text-white">-- m³/s</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">CFL Condition:</span> <span id="out-cfl" class="text-white">--</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Time Taken:</span> <span id="out-time" class="text-white">-- ms</span></div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Map View -->
    <main class="flex-1 relative">
        <div class="map-container">
            <iframe id="map-frame" src="/map"></iframe>
        </div>
        
        <!-- Legend Overlay -->
        <div class="absolute bottom-6 left-6 glass-panel p-4 rounded-lg z-10 w-48">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Cartographic Legend</h3>
            <div class="space-y-2">
                <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-[#FFEB3B] opacity-80"></div><span class="text-xs text-slate-300">Shallow (<1.0m)</span></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-[#FF9800] opacity-80"></div><span class="text-xs text-slate-300">Moderate (1-2.5m)</span></div>
                <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-[#F44336] opacity-80"></div><span class="text-xs text-slate-300">Severe (>2.5m)</span></div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('sim-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('run-btn');
            btn.textContent = 'Solving...';
            btn.disabled = true;

            const payload = {
                rain_intensity_mm_hr: parseFloat(document.getElementById('rain').value),
                tide_level_m: parseFloat(document.getElementById('tide').value),
                duration_hrs: 3.0
            };

            try {
                const res = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                // Update UI
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('out-q').textContent = data.peak_discharge + ' m³/s';
                document.getElementById('out-cfl').textContent = data.cfl_limit;
                document.getElementById('out-time').textContent = '245 ms'; // mock timing

                // Reload the map iframe to fetch the newly generated map
                document.getElementById('map-frame').src = '/map?refresh=' + new Date().getTime();

            } catch (err) {
                console.error(err);
                alert("JAX Engine Error: " + err.message);
            } finally {
                btn.textContent = 'Solve JAX Tensors';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
